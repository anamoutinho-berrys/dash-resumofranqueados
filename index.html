<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berry's — Relatório de Meta Ads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,600;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --blue:       #1E63D6;   /* primary royal blue */
  --blue-deep:  #12388A;   /* heading navy-blue */
  --blue-title: #16479E;   /* big titles */
  --blue-brt:   #2E6BE0;   /* values / numbers */
  --blue-soft:  #4C9BE6;   /* light accent */
  --blob:       #DCEBFB;   /* pale cow-spot blue */
  --blob2:      #EAF3FD;
  --circle:     #DEEBFC;   /* icon circle bg */
  --circle2:    #EAF3FD;
  --ice:        #EAF3FD;
  --ice2:       #F3F9FE;
  --white:      #FFFFFF;
  --ink:        #23303D;
  --ink2:       #435264;
  --ink3:       #7A8A99;
  --line:       #E4EEF9;
  --navy:       #0E2A57;
  --green:      #16A34A;
  --shadow:     0 8px 30px rgba(30,99,214,.10);
  --shadow-sm:  0 4px 18px rgba(30,99,214,.08);
  --r-card:     24px;
  --r-pill:     100px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Montserrat', 'Segoe UI', sans-serif;
  background:
    radial-gradient(1100px 520px at -10% -8%, var(--blob) 0%, transparent 55%),
    radial-gradient(900px 480px at 110% -6%, var(--blob2) 0%, transparent 55%),
    #F4F9FE;
  background-attachment: fixed;
  min-height: 100vh;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

/* ── SETUP BAR ── */
.setup-bar {
  background: var(--navy);
  padding: 10px 16px; display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap;
}
.setup-bar label { color: #9EC6F5; font-size: 11px; font-weight: 800; white-space: nowrap; letter-spacing: .5px; text-transform: uppercase; }
.setup-bar input {
  flex: 1; min-width: 180px; padding: 8px 14px; border-radius: 10px;
  border: 1.5px solid rgba(120,175,240,.25); font-size: 13px;
  background: rgba(255,255,255,.07); color: white; font-family: inherit;
}
.setup-bar input:focus { outline: none; border-color: var(--blue-soft); }
.setup-bar input::placeholder { color: rgba(255,255,255,.35); }
.setup-bar select {
  padding: 8px 12px; border-radius: 10px; border: 1.5px solid rgba(120,175,240,.25);
  font-size: 12px; background: rgba(255,255,255,.07); color: white; cursor: pointer;
  font-family: inherit; font-weight: 700;
}
.btn-connect {
  background: var(--blue); color: white; border: none; padding: 9px 20px;
  border-radius: 10px; font-size: 12px; font-weight: 800; cursor: pointer;
  letter-spacing: .3px; font-family: inherit; box-shadow: 0 4px 14px rgba(30,99,214,.35);
  transition: transform .15s, box-shadow .15s;
}
.btn-connect:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(30,99,214,.45); }

/* ── TABS ── */
.tabs-wrap {
  background: var(--white); border-bottom: 1.5px solid var(--line);
  overflow-x: auto; white-space: nowrap; padding: 0 16px;
  position: sticky; top: 0; z-index: 10;
  box-shadow: 0 2px 16px rgba(30,99,214,.08); scrollbar-width: none;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tab {
  display: inline-block; padding: 13px 15px; cursor: pointer;
  font-size: 12px; font-weight: 700; color: var(--ink3);
  border-bottom: 3px solid transparent; transition: all .15s; user-select: none;
}
.tab:hover { color: var(--blue); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); }

/* ── PAGE ── */
.page { max-width: 460px; margin: 0 auto; padding: 20px 14px 40px; }

/* ── HEADER ── */
.dash-header {
  background: var(--white); border-radius: 30px; padding: 22px 22px 20px;
  margin-bottom: 16px; position: relative; overflow: hidden;
  box-shadow: var(--shadow); border: 1px solid var(--line); min-height: 216px;
}
.hdr-blobs { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.hdr-row { position: relative; z-index: 2; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.hdr-logo { height: 30px; width: auto; display: block; }
.hdr-bell {
  width: 38px; height: 38px; border-radius: 12px; background: var(--white);
  border: 1px solid var(--line); box-shadow: var(--shadow-sm);
  display: flex; align-items: center; justify-content: center; color: var(--blue);
}
.h-title {
  position: relative; z-index: 2; color: var(--blue-title);
  font-size: 33px; font-weight: 900; line-height: .98; letter-spacing: -.5px;
  max-width: 62%;
}
.h-sub { position: relative; z-index: 2; margin-top: 10px; font-size: 13.5px; font-weight: 700; color: var(--ink2); max-width: 66%; }
.h-sub b { color: var(--blue); font-weight: 800; }
.h-unit { color: var(--blue-soft); font-weight: 800; }
.date-pill {
  position: relative; z-index: 2; margin-top: 16px;
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--white); border: 1.5px solid var(--line);
  border-radius: 14px; padding: 9px 15px; color: var(--ink); font-size: 12.5px; font-weight: 700;
  box-shadow: var(--shadow-sm);
}
.date-pill svg { color: var(--blue); }
.date-pill .caret { color: var(--ink3); margin-left: 2px; }
.mascot {
  position: absolute; right: -14px; top: -6px; height: 210px; z-index: 1;
  filter: drop-shadow(-6px 8px 16px rgba(14,42,87,.16));
  object-fit: contain; pointer-events: none;
}

/* ── KPI CARDS ── */
.kpi-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 11px; margin-bottom: 16px; }
.kpi-card {
  background: var(--white); border-radius: 20px; padding: 16px 10px 15px;
  text-align: center; box-shadow: var(--shadow-sm); border: 1px solid var(--line);
}
.kpi-ico {
  width: 46px; height: 46px; border-radius: 50%; background: var(--circle);
  display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; color: var(--blue);
}
.kpi-label { font-size: 9.5px; color: var(--ink3); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; line-height: 1.2; }
.kpi-value { font-size: 17px; font-weight: 900; color: var(--blue-deep); line-height: 1; }

/* ── SECTION ── */
.section {
  background: var(--white); border-radius: var(--r-card); padding: 20px 18px;
  margin-bottom: 16px; box-shadow: var(--shadow-sm); border: 1px solid var(--line);
}
.sec-title { font-size: 17px; font-weight: 900; color: var(--blue-deep); margin-bottom: 16px; display: flex; align-items: center; gap: 11px; }
.sec-ico {
  width: 38px; height: 38px; border-radius: 12px; background: var(--circle);
  display: flex; align-items: center; justify-content: center; color: var(--blue); flex-shrink: 0;
}

/* ── CAMPAIGNS ── */
.camp-item { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--line); }
.camp-item:first-child { padding-top: 2px; }
.camp-item:last-child { border-bottom: none; padding-bottom: 2px; }
.camp-ico { width: 44px; height: 44px; min-width: 44px; border-radius: 13px; background: var(--circle); display: flex; align-items: center; justify-content: center; color: var(--blue); }
.camp-main { flex: 1; min-width: 0; }
.camp-name { font-size: 12.5px; font-weight: 800; color: var(--ink); line-height: 1.3; }
.camp-sub { font-size: 11px; font-weight: 700; color: var(--blue); margin-top: 2px; }
.camp-nums { display: flex; gap: 16px; flex-shrink: 0; text-align: right; }
.cn-l { font-size: 9px; color: var(--ink3); font-weight: 700; text-transform: uppercase; letter-spacing: .3px; margin-bottom: 2px; }
.cn-v { font-size: 13px; font-weight: 900; color: var(--blue-deep); }
.camp-spend { font-size: 11.5px; font-weight: 800; color: var(--ink2); margin-top: 3px; }

/* ── META RESUMO ── */
.meta-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.meta-logo { width: 44px; height: 44px; border-radius: 13px; flex-shrink: 0; background: linear-gradient(135deg, #0668E1, #0090FF); display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 14px rgba(6,104,225,.25); }
.meta-info-label { font-size: 10px; color: var(--ink3); font-weight: 700; letter-spacing: .5px; text-transform: uppercase; }
.meta-info-name  { font-size: 13.5px; font-weight: 900; color: var(--ink); }
.resumo-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; background: var(--ice2); border-radius: 16px; padding: 15px 12px; border: 1px solid var(--line); }
.rg-label { font-size: 8px; color: var(--ink3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; font-weight: 700; }
.rg-value { font-size: 12px; font-weight: 900; color: var(--blue-deep); }

/* ── TOP ADS ── */
.ad-item { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--line); }
.ad-item:last-child { border-bottom: none; padding-bottom: 2px; }
.rank-badge { width: 32px; height: 32px; min-width: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; flex-shrink: 0; }
.rb-1 { background: linear-gradient(135deg, #FCD34D, #F59E0B); color: #7C3A00; box-shadow: 0 3px 10px rgba(245,158,11,.35); }
.rb-2 { background: linear-gradient(135deg, #D9DEE6, #AEB6C2); color: #34404F; }
.rb-3 { background: linear-gradient(135deg, #E1A46A, #C57B36); color: white; }
.ad-thumb { width: 56px; height: 56px; min-width: 56px; border-radius: 14px; object-fit: cover; background: var(--ice); border: 1px solid var(--line); }
.ad-thumb-ph { width: 56px; height: 56px; min-width: 56px; border-radius: 14px; background: var(--circle2); display: flex; align-items: center; justify-content: center; color: var(--blue-soft); border: 1px solid var(--line); }
.ad-info { flex: 1; min-width: 0; }
.ad-name { font-size: 12.5px; font-weight: 800; color: var(--ink); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ad-metrics { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
.am-l { font-size: 8.5px; color: var(--ink3); font-weight: 700; text-transform: uppercase; letter-spacing: .3px; margin-bottom: 2px; }
.am-v { font-size: 12.5px; font-weight: 900; color: var(--blue-deep); }
.top1-card { background: linear-gradient(135deg, #FFFBF0, #FFF8E8); border: 1.5px solid #FBE3AC; border-radius: 18px; padding: 14px 13px; margin-bottom: 4px; box-shadow: 0 4px 16px rgba(245,158,11,.08); position: relative; }
.top1-seal { position: absolute; top: -9px; left: 14px; background: linear-gradient(135deg, #FCD34D, #F59E0B); color: #7C3A00; font-size: 8.5px; font-weight: 900; padding: 4px 10px; border-radius: var(--r-pill); box-shadow: 0 2px 8px rgba(245,158,11,.35); letter-spacing: .3px; display: inline-flex; align-items: center; gap: 4px; }

/* ── INSIGHTS ── */
.ins-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 11px; }
.ins-card { background: var(--ice2); border-radius: 16px; padding: 15px 14px; border: 1px solid var(--line); }
.ins-ico { width: 38px; height: 38px; border-radius: 11px; background: var(--white); display: flex; align-items: center; justify-content: center; color: var(--blue); margin-bottom: 10px; box-shadow: var(--shadow-sm); }
.ins-label { font-size: 9px; color: var(--ink3); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.ins-name { font-size: 10.5px; font-weight: 700; color: var(--ink2); margin-bottom: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ins-value { font-size: 16px; font-weight: 900; color: var(--blue); }

/* ── DIVIDER ── */
.section-divider { display: flex; align-items: center; gap: 10px; margin: 6px 0 4px; }
.section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }
.section-divider svg { color: var(--blue-soft); }

/* ── FOOTER ── */
.dash-footer {
  position: relative; overflow: hidden; border-radius: 22px; margin-top: 4px;
  background: linear-gradient(135deg, #1E63D6 0%, #1748A8 100%);
  padding: 22px 20px 20px; text-align: center;
}
.foot-wave { position: absolute; left: 0; right: 0; bottom: 0; width: 100%; display: block; z-index: 0; }
.foot-inner { position: relative; z-index: 2; }
.foot-ico { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,.16); display: inline-flex; align-items: center; justify-content: center; color: white; margin-bottom: 10px; }
.foot-tagline { color: white; font-size: 14.5px; font-weight: 800; font-style: italic; margin-bottom: 6px; }
.foot-tagline b { font-weight: 900; }
.foot-meta { color: rgba(255,255,255,.72); font-size: 9.5px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase; }

/* ── EXPORT ── */
.export-wrap { max-width: 460px; margin: 0 auto; padding: 0 14px 50px; }
.btn-export {
  background: var(--navy); color: white; border: none; padding: 16px; border-radius: 16px;
  font-size: 14px; font-weight: 800; cursor: pointer; width: 100%;
  box-shadow: 0 4px 18px rgba(14,42,87,.3); font-family: inherit; letter-spacing: .3px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: transform .15s, box-shadow .15s;
}
.btn-export:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(14,42,87,.4); }
.btn-export:disabled { opacity: .5; cursor: default; transform: none; }

/* ── STATES ── */
.state-box { text-align: center; padding: 64px 24px; color: var(--ink3); }
.state-ico { color: var(--blue-soft); margin-bottom: 16px; display: flex; justify-content: center; }
.state-box p { font-size: 14px; line-height: 1.75; font-weight: 600; }
.state-box strong { color: var(--blue); }
.spinner { width: 38px; height: 38px; border: 3px solid var(--ice); border-top-color: var(--blue); border-radius: 50%; animation: spin .75s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.err-box { background: #FFF0F0; border: 1.5px solid #FCA5A5; border-radius: 14px; padding: 14px; color: #DC2626; font-size: 13px; margin: 14px 0; font-weight: 700; }
.no-data { color: var(--ink3); font-size: 13px; text-align: center; padding: 16px 0; font-weight: 600; }
</style>
</head>
<body>

<div class="setup-bar">
  <label>Token:</label>
  <input type="password" id="tokenInput" placeholder="Cole o Access Token do Meta Ads…" />
  <select id="datePreset" onchange="reloadTab()">
    <option value="this_month">Mês atual</option>
    <option value="last_month">Mês anterior</option>
    <option value="last_7d">Últimos 7 dias</option>
    <option value="last_30d">Últimos 30 dias</option>
    <option value="this_year">Este ano</option>
  </select>
  <button class="btn-connect" onclick="connect()">Conectar</button>
</div>

<div class="tabs-wrap" id="tabsWrap"></div>

<div class="page" id="dashPage">
  <div class="state-box">
    <div class="state-ico"></div>
    <p>Cole o <strong>Access Token</strong> da Meta acima<br>e clique em <strong>Conectar</strong> para carregar<br>os dados da unidade.</p>
  </div>
</div>

<div class="export-wrap" id="exportWrap" style="display:none">
  <button class="btn-export" id="btnExport" onclick="exportImage()"> Exportar como imagem</button>
</div>

const GRAPH = 'https://graph.facebook.com/v20.0';
let token = '', activeTab = 0;
const cache = {};

function buildTabs() {
  document.getElementById('tabsWrap').innerHTML =
    ACCOUNTS.map((a,i) =>
      `<div class="tab${i===0?' active':''}" id="tab${i}" onclick="switchTab(${i})">${a.name}</div>`
    ).join('');
}
function switchTab(i) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab${i}`).classList.add('active');
  activeTab = i;
  if (token) loadData(i);
}
function connect() {
  token = document.getElementById('tokenInput').value.trim();
  if (!token) { alert('Cole o Access Token antes de conectar.'); return; }
  Object.keys(cache).forEach(k => delete cache[k]);
  document.getElementById('exportWrap').style.display = 'block';
  loadData(activeTab);
}
function reloadTab() {
  Object.keys(cache).forEach(k => delete cache[k]);
  if (token) loadData(activeTab);
}
async function gql(path, params={}) {
  const url = new URL(`${GRAPH}/${path}`);
  url.searchParams.set('access_token', token);
  for (const [k,v] of Object.entries(params)) url.searchParams.set(k,v);
  const r = await fetch(url);
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d;
}
async function loadData(idx) {
  const acc = ACCOUNTS[idx];
  const preset = document.getElementById('datePreset').value;
  const key = `${acc.id}_${preset}`;
  setLoading(acc.name);
  try {
    if (!cache[key]) cache[key] = await fetchAll(acc, preset);
    render(acc, cache[key]);
  } catch(e) { setError(e.message); }
}
async function fetchAll(acc, preset) {
  const act = `act_${acc.id}`;
  const totals = await gql(`${act}/insights`, { fields:'spend,reach,impressions', date_preset:preset })
    .catch(e => { throw new Error('[1/4 insights] ' + e.message); });
  const camps = await gql(`${act}/campaigns`, { fields: 'name,objective,effective_status', limit: 50 })
    .catch(e => { throw new Error('[2/4 campaigns] ' + e.message); });
  const campIns = await gql(`${act}/insights`, {
    level: 'campaign', fields: 'campaign_id,campaign_name,spend,reach,impressions', date_preset: preset, limit: 30
  }).catch(e => { throw new Error('[3/4 campaign insights] ' + e.message); });
  const adsIns = await gql(`${act}/insights`, {
    level:'ad', fields:'ad_id,ad_name,spend,reach,impressions,clicks', date_preset:preset, limit:20
  }).catch(e => { throw new Error('[4/4 ad insights] ' + e.message); });

  const campInsMap = {};
  (campIns.data||[]).forEach(c => { campInsMap[c.campaign_id] = c; });
  const campaigns = (camps.data||[])
    .map(c => ({ ...c, _ins: campInsMap[c.id] || null }))
    .filter(c => Number(c._ins?.impressions||0) > 1);
  const rawAds = (adsIns.data||[])
    .filter(a => Number(a.impressions||0) > 1)
    .sort((a,b) => Number(b.reach||0) - Number(a.reach||0))
    .slice(0,3);
  const topAds = await Promise.all(rawAds.map(async ad => {
    try {
      const d = await gql(ad.ad_id, { fields:'creative{thumbnail_url,image_url}' });
      return { ...ad, thumb: d.creative?.thumbnail_url || d.creative?.image_url || null };
    } catch { return { ...ad, thumb:null }; }
  }));
  return { summary: totals.data?.[0]||{}, campaigns, topAds };
}

const N   = n => n ? Number(n).toLocaleString('pt-BR') : '0';
const BRL = n => n ? Number(n).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}) : 'R$ 0,00';

function dateLabel() {
  const p = document.getElementById('datePreset').value;
  const d = new Date(), day=d.getDate(), yr=d.getFullYear();
  const mo = d.toLocaleString('pt-BR',{month:'long'});
  return { this_month:`01 a ${day} de ${mo} de ${yr}`, last_month:'Mês anterior',
           last_7d:'Últimos 7 dias', last_30d:'Últimos 30 dias',
           this_year:`Janeiro a ${mo} de ${yr}` }[p]||p;
}
function periodShort() {
  const p = document.getElementById('datePreset').value;
  const d = new Date();
  return { this_month:`01–${d.getDate()}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`,
           last_month:'Mês anterior', last_7d:'Últ. 7 dias',
           last_30d:'Últ. 30 dias', this_year:String(d.getFullYear()) }[p]||p;
}
function campIcon(name='', obj='') {
  const t = (name+obj).toUpperCase();
  if (t.includes('VIDEO')||t.includes('VÍDEO')||t.includes('REEL')) return IC.play;
  if (t.includes('SEGUIDOR')||t.includes('FOLLOW')||t.includes('PERFIL')) return IC.follow;
  if (t.includes('IFOOD')||t.includes('DELIVERY')||t.includes('VENDA')||t.includes('CONVERSÃO')) return IC.cart;
  if (t.includes('ALCAN')||t.includes('REACH')||t.includes('TEMÁTIC')||t.includes('TEMATIC')) return IC.target;
  return IC.mega;
}

function setLoading(name) {
  document.getElementById('dashPage').innerHTML =
    `<div class="state-box"><div class="spinner"></div><p>Carregando dados de<br><strong>${name}</strong>…</p></div>`;
}
function setError(msg) {
  document.getElementById('dashPage').innerHTML =
    `<div class="state-box"><div class="state-ico">${IC.cone}</div>
     <div class="err-box">${msg}</div>
     <p style="font-size:12px;font-weight:600">Verifique o token e a permissão <code>ads_read</code>.</p></div>`;
}

const RB = ['rb-1','rb-2','rb-3'];

function render(acc, {summary, campaigns, topAds}) {
  const best   = topAds[0]||null;
  const topClk = [...topAds].sort((a,b)=>Number(b.clicks||0)-Number(a.clicks||0))[0];
  const topRch = [...topAds].sort((a,b)=>Number(b.reach||0)-Number(a.reach||0))[0];
  const topImp = [...topAds].sort((a,b)=>Number(b.impressions||0)-Number(a.impressions||0))[0];

  const campsHtml = campaigns.length === 0
    ? '<p class="no-data">Nenhuma campanha veiculou no período.</p>'
    : campaigns.map(c => {

        return `<div class="camp-item">
          <div class="camp-ico">${campIcon(c.name, c.objective||'')}</div>
          <div class="camp-main">
            <div class="camp-name">${c.name}</div>
            <div class="camp-spend">${BRL(ins.spend)} investido</div>
          </div>
          <div class="camp-nums">
            <div><div class="cn-l">Alcance</div><div class="cn-v">${N(ins.reach)}</div></div>
            <div><div class="cn-l">Impr.</div><div class="cn-v">${N(ins.impressions)}</div></div>
          </div>
        </div>`;
      }).join('');

  const adMetrics = ad => `<div class="ad-metrics">
      <div><div class="am-l">Alcance</div><div class="am-v">${N(ad.reach)}</div></div>
      <div><div class="am-l">Impressões</div><div class="am-v">${N(ad.impressions)}</div></div>
      <div><div class="am-l">Cliques</div><div class="am-v">${N(ad.clicks)}</div></div>
    </div>`;
  const thumb = ad => ad.thumb
    ? `<img class="ad-thumb" src="${ad.thumb}" crossorigin="anonymous" alt="" onerror="this.outerHTML='<div class=ad-thumb-ph>${IC.img.replace(/"/g,'&quot;')}</div>'">`
    : `<div class="ad-thumb-ph">${IC.img}</div>`;

  const top1Html = topAds[0] ? `
    <div class="top1-card">
      <div class="top1-seal">${IC.star} MELHOR DESEMPENHO</div>
      <div class="ad-item" style="padding:8px 0 0;border:none">
        <div class="rank-badge rb-1">1</div>
        ${thumb(topAds[0])}
        <div class="ad-info">
          <div class="ad-name" title="${topAds[0].ad_name}">${topAds[0].ad_name}</div>
          ${adMetrics(topAds[0])}
        </div>
      </div>
    </div>` : '';

  const otherAdsHtml = topAds.slice(1).map((ad,i) => `
      <div class="ad-item">
        <div class="rank-badge ${RB[i+1]}">${i+2}</div>
        ${thumb(ad)}
        <div class="ad-info">
          <div class="ad-name" title="${ad.ad_name}">${ad.ad_name}</div>
          ${adMetrics(ad)}
        </div>
      </div>`).join('');

  const adsHtml = topAds.length === 0
    ? '<p class="no-data">Sem dados de anúncios no período.</p>'
    : top1Html + (otherAdsHtml ? `<div class="section-divider">${IC.cone}</div>${otherAdsHtml}` : '');

  const insCards = [
    {ico:IC.trophy, label:'Melhor anúncio',        name:best?.ad_name||'—',    value:BRL(best?.spend)},
    {ico:IC.cursor, label:'Maior vol. de cliques', name:topClk?.ad_name||'—',  value:`${N(topClk?.clicks)} cliques`},
    {ico:IC.people, label:'Maior alcance',         name:topRch?.ad_name||'—',  value:`${N(topRch?.reach)} pessoas`},
    {ico:IC.eye,    label:'Mais impressões',       name:topImp?.ad_name||'—',  value:`${N(topImp?.impressions)} imp.`},
  ].map(c=>`<div class="ins-card">
    <div class="ins-ico">${c.ico}</div>
    <div class="ins-label">${c.label}</div>
    <div class="ins-name" title="${c.name}">${c.name}</div>
    <div class="ins-value">${c.value}</div>
  </div>`).join('');

  document.getElementById('dashPage').innerHTML = `
  <div id="exportTarget">
    <div class="dash-header">
      ${HDR_BLOBS}
      <div class="hdr-row">
        <img class="hdr-logo" src="${LOGO}" alt="Berry's">
        <div class="hdr-bell">${IC.bell}</div>
      </div>
      <div class="h-title">Relatório de Meta Ads</div>
      <div class="h-sub">Meta Ads — <b>Berry's</b> <span class="h-unit">| ${acc.name.toUpperCase()}</span></div>
      <div class="date-pill">${IC.cal} ${dateLabel()} <span class="caret">${IC.caret}</span></div>
      <img class="mascot" src="${MASCOT}" alt="" onerror="this.style.display='none'">
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-ico">${IC.money}</div>
        <div class="kpi-label">Total investido</div>
        <div class="kpi-value">${BRL(summary.spend)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-ico">${IC.people}</div>
        <div class="kpi-label">Alcance total</div>
        <div class="kpi-value">${N(summary.reach)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-ico">${IC.eye}</div>
        <div class="kpi-label">Impressões totais</div>
        <div class="kpi-value">${N(summary.impressions)}</div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title"><div class="sec-ico">${IC.mega}</div>Campanhas ativas</div>
      ${campsHtml}
    </div>

    <div class="section">
      <div class="sec-title"><div class="sec-ico">${IC.infinity}</div>Resumo da conta Meta Ads</div>
      <div class="meta-row">
        <div class="meta-logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M14 8.5V7c0-.9.4-1.3 1.3-1.3H17V2.7h-2.5c-2.7 0-3.8 1.4-3.8 3.9v1.9H9v3h1.7V22H14v-10.5h2.4l.4-3H14Z"/></svg></div>
        <div>
          <div class="meta-info-label">Meta Ads</div>
          <div class="meta-info-name">Berry's | ${acc.name}</div>
        </div>
      </div>
      <div class="resumo-grid">
        <div><div class="rg-label">Investimento</div><div class="rg-value">${BRL(summary.spend)}</div></div>
        <div><div class="rg-label">Alcance</div><div class="rg-value">${N(summary.reach)}</div></div>
        <div><div class="rg-label">Impressões</div><div class="rg-value">${N(summary.impressions)}</div></div>
        <div><div class="rg-label">Período</div><div class="rg-value" style="font-size:10px">${periodShort()}</div></div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title"><div class="sec-ico">${IC.trophy}</div>Melhores anúncios</div>
      ${adsHtml}
    </div>

    ${topAds.length > 0 ? `
    <div class="section">
      <div class="sec-title"><div class="sec-ico">${IC.bolt}</div>Insights rápidos</div>
      <div class="ins-grid">${insCards}</div>
    </div>` : ''}

    <div class="dash-footer">
      <svg class="foot-wave" viewBox="0 0 460 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 38 C 70 20, 140 56, 230 40 C 320 24, 390 52, 460 36 L460 60 L0 60 Z" fill="rgba(255,255,255,.10)"/>
        <path d="M0 48 C 80 34, 150 60, 240 46 C 330 32, 400 56, 460 44 L460 60 L0 60 Z" fill="rgba(255,255,255,.08)"/>
      </svg>
      <div class="foot-inner">
        <div class="foot-ico">${IC.cone}</div>
        <div class="foot-tagline">"A gente quer sabor. A gente quer <b>Berry's</b>."</div>
        <div class="foot-meta">Relatório gerado com dados de Meta Ads · ${acc.name}</div>
      </div>
    </div>
  </div>`;
}

async function exportImage() {
  const el = document.getElementById('exportTarget');
  if (!el) return;
  const btn = document.getElementById('btnExport');
  btn.disabled = true; btn.textContent = 'Gerando imagem…';
  try {
    const canvas = await html2canvas(el, { scale:2.5, useCORS:true, backgroundColor:'#F4F9FE', logging:false });
    const link = document.createElement('a');
    link.download = `berrys_${ACCOUNTS[activeTab].name.replace(/\s+/g,'_')}_meta_ads.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) { alert('Erro: '+e.message); }
  btn.disabled = false; btn.innerHTML = IC.cam + ' Exportar como imagem';
}

/* boot: inject static icons */
document.querySelector('.state-ico').innerHTML = IC.cone;
document.getElementById('btnExport').innerHTML = IC.cam + ' Exportar como imagem';
