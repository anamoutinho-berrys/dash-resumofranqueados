<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berry's — Dashboard Meta Ads</title>
<style>
:root {
  --blue:    #1a3c8f;
  --blue2:   #2d6fd4;
  --blue3:   #4a90d9;
  --blight:  #ddeafc;
  --gray:    #f0f4fb;
  --text:    #111827;
  --text2:   #6b7280;
  --green:   #16a34a;
  --white:   #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #e8eef8; min-height: 100vh; }

/* ── SETUP BAR ── */
.setup-bar {
  background: #0f2460;
  padding: 9px 16px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.setup-bar label { color: #aac4f0; font-size: 12px; font-weight: 600; white-space: nowrap; }
.setup-bar input {
  flex: 1; min-width: 180px;
  padding: 6px 12px; border-radius: 8px; border: none;
  font-size: 13px; background: #1d3a7a; color: white;
}
.setup-bar input::placeholder { color: #6b8ccc; }
.setup-bar select {
  padding: 6px 10px; border-radius: 8px; border: none;
  font-size: 12px; background: #1d3a7a; color: white; cursor: pointer;
}
.btn-connect {
  background: var(--blue3); color: white; border: none;
  padding: 6px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;
}
.btn-connect:hover { background: #3a80c9; }

/* ── TABS ── */
.tabs-wrap {
  background: white;
  border-bottom: 2px solid #dde8f8;
  overflow-x: auto; white-space: nowrap; padding: 0 12px;
  position: sticky; top: 0; z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.tab {
  display: inline-block;
  padding: 11px 15px; cursor: pointer;
  font-size: 12px; font-weight: 500; color: var(--text2);
  border-bottom: 3px solid transparent;
  transition: all .15s; user-select: none;
}
.tab:hover { color: var(--blue); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 700; }

/* ── PAGE ── */
.page { max-width: 430px; margin: 0 auto; padding: 16px 12px 36px; }

/* ── HEADER ── */
.dash-header {
  background: linear-gradient(135deg, #1a3c8f 0%, #2558c0 60%, #3a78d8 100%);
  border-radius: 22px;
  padding: 24px 20px 20px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
  min-height: 190px;
}
/* snowflakes */
.dash-header::before {
  content: '❄ ❄ ❄';
  position: absolute; top: 12px; right: 110px;
  color: rgba(255,255,255,.18); font-size: 18px; letter-spacing: 14px;
  pointer-events: none;
}
.dash-header::after {
  content: '❄ ❄';
  position: absolute; bottom: 22px; right: 130px;
  color: rgba(255,255,255,.12); font-size: 14px; letter-spacing: 18px;
  pointer-events: none;
}
.header-logo {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.header-logo img.brand-logo {
  height: 36px; filter: brightness(0) invert(1);
}
.brand-text {
  color: white; font-size: 18px; font-weight: 900; letter-spacing: .5px;
}
.brand-text span { color: #7eb8ff; }
.dash-title {
  color: white; font-size: 34px; font-weight: 900; line-height: 1;
  margin-bottom: 2px;
}
.dash-subtitle {
  color: rgba(255,255,255,.75); font-size: 13px; font-weight: 500;
}
.dash-unit { color: #7eb8ff; font-weight: 800; }
.date-row { margin-top: 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.date-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.15); border-radius: 20px;
  padding: 5px 13px; color: white; font-size: 12px; font-weight: 600;
  backdrop-filter: blur(4px);
}
.live-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: #e2f7ee; color: var(--green);
  border-radius: 20px; padding: 4px 11px;
  font-size: 11px; font-weight: 700;
}
.live-pill .dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--green);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; } 50% { opacity: .4; }
}
.mascot {
  position: absolute;
  right: -6px; bottom: 0;
  height: 175px;
  filter: drop-shadow(-4px 4px 12px rgba(0,0,0,.25));
}

/* ── KPI ── */
.kpi-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 12px; }
.kpi-card {
  background: white; border-radius: 16px;
  padding: 14px 10px; text-align: center;
  box-shadow: 0 2px 8px rgba(26,60,143,.08);
}
.kpi-icon {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; margin: 0 auto 7px;
}
.kpi-icon.money  { background: #ddeafc; }
.kpi-icon.reach  { background: #ddf3e4; }
.kpi-icon.eye    { background: #e8e0fc; }
.kpi-label { font-size: 10px; color: var(--text2); margin-bottom: 3px; }
.kpi-value { font-size: 14px; font-weight: 900; color: var(--blue); line-height: 1.1; }

/* ── SECTION ── */
.section {
  background: white; border-radius: 18px;
  padding: 18px 16px; margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(26,60,143,.07);
}
.section-title {
  font-size: 15px; font-weight: 800; color: var(--blue); margin-bottom: 14px;
  display: flex; align-items: center; gap: 7px;
}
.section-title .icon { font-size: 17px; }

/* ── CAMPAIGN ── */
.camp-item {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 0; border-bottom: 1px solid var(--gray);
}
.camp-item:last-child { border-bottom: none; padding-bottom: 0; }
.camp-icon {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--blue2);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0; color: white;
}
.camp-icon.video  { background: #1a3c8f; }
.camp-icon.reach  { background: #2558c0; }
.camp-icon.follow { background: #2d6fd4; }
.camp-icon.conv   { background: #1a8a5e; }
.camp-name { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 5px; line-height: 1.3; }
.camp-metrics {
  display: flex; gap: 6px; align-items: center;
  font-size: 11px; color: var(--text2);
}
.camp-metrics strong { color: var(--text); }
.sep { color: #ccc; }

/* ── RESUMO ── */
.resumo-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0;
}
.meta-logo {
  width: 40px; height: 40px; border-radius: 12px;
  background: linear-gradient(135deg, #0668E1, #0090FF);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0; color: white; font-weight: 900;
}
.resumo-label { font-size: 11px; color: var(--text2); }
.resumo-name  { font-size: 13px; font-weight: 700; color: var(--text); }
.resumo-stats {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 8px; margin-top: 14px;
  background: var(--gray); border-radius: 12px; padding: 12px;
}
.rs-label { font-size: 9px; color: var(--text2); margin-bottom: 2px; }
.rs-value { font-size: 13px; font-weight: 800; color: var(--blue); }

/* ── BEST ADS ── */
.ad-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--gray);
}
.ad-item:last-child { border-bottom: none; padding-bottom: 0; }
.ad-medal {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 12px; flex-shrink: 0;
}
.m1 { background: #ffd700; color: #7a5a00; }
.m2 { background: #c8c8c8; color: #444; }
.m3 { background: #cd7f32; color: white; }
.ad-thumb {
  width: 54px; height: 54px; border-radius: 10px;
  object-fit: cover; flex-shrink: 0; background: var(--gray);
}
.ad-thumb-ph {
  width: 54px; height: 54px; border-radius: 10px;
  background: var(--blight);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.ad-info { flex: 1; min-width: 0; }
.ad-name {
  font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ad-metrics { display: grid; grid-template-columns: repeat(4,1fr); gap: 3px; }
.am-label { font-size: 9px; color: var(--text2); text-decoration: underline; }
.am-value { font-size: 11px; font-weight: 800; color: var(--text); }

/* ── INSIGHTS ── */
.insights-grid {
  display: grid; grid-template-columns: repeat(2,1fr); gap: 8px;
}
.insight-card {
  background: var(--gray); border-radius: 14px; padding: 12px;
}
.ins-icon { font-size: 18px; margin-bottom: 5px; }
.ins-label { font-size: 10px; color: var(--text2); margin-bottom: 2px; }
.ins-name  { font-size: 10px; font-weight: 700; color: var(--text); margin-bottom: 4px;
             white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ins-value { font-size: 14px; font-weight: 900; color: var(--blue); }

/* ── EXPORT ── */
.export-wrap { max-width: 430px; margin: 0 auto; padding: 0 12px 40px; }
.btn-export {
  background: var(--blue); color: white; border: none;
  padding: 14px; border-radius: 14px; font-size: 14px; font-weight: 800;
  cursor: pointer; width: 100%;
}
.btn-export:hover { background: #142f7a; }
.btn-export:disabled { opacity: .5; cursor: default; }

/* ── STATES ── */
.state-box { text-align: center; padding: 52px 24px; color: var(--text2); }
.state-box .ico { font-size: 46px; margin-bottom: 14px; }
.state-box p { font-size: 14px; line-height: 1.7; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--blight); border-top-color: var(--blue);
  border-radius: 50%; animation: spin .75s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.err-box {
  background: #fdf0f0; border: 1px solid #f5c6c6; border-radius: 12px;
  padding: 14px; color: #c0392b; font-size: 13px; margin: 12px 0;
}
.no-data { color: var(--text2); font-size: 13px; text-align: center; padding: 12px 0; }
</style>
</head>
<body>

<!-- Setup -->
<div class="setup-bar">
  <label>🔑 Token Meta Ads:</label>
  <input type="password" id="tokenInput" placeholder="Cole seu Access Token aqui..." />
  <select id="datePreset" onchange="reloadTab()">
    <option value="this_month">Mês atual</option>
    <option value="last_month">Mês anterior</option>
    <option value="last_7d">Últimos 7 dias</option>
    <option value="last_30d">Últimos 30 dias</option>
    <option value="this_year">Este ano</option>
  </select>
  <button class="btn-connect" onclick="connect()">Conectar</button>
</div>

<!-- Tabs -->
<div class="tabs-wrap" id="tabsWrap"></div>

<!-- Dashboard -->
<div class="page" id="dashPage">
  <div class="state-box">
    <div class="ico">🔑</div>
    <p>Cole o <strong>Access Token</strong> da Meta acima<br>e clique em <strong>Conectar</strong> para carregar os dados.</p>
  </div>
</div>

<!-- Export -->
<div class="export-wrap" id="exportWrap" style="display:none">
  <button class="btn-export" id="btnExport" onclick="exportImage()">📸 Exportar como imagem</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ─── CONTAS ───────────────────────────────────────────────────
const ACCOUNTS = [
  { id: '980007099641939',   name: 'MOC Avenida' },
  { id: '3407509682745878',  name: 'Maceió' },
  { id: '385985127004742',   name: 'Savassi' },
  { id: '26769229962779082', name: 'MOC Centro' },
  { id: '3413870375457406',  name: 'Guanambi' },
  { id: '1320841319338526',  name: 'Recife' },
  { id: '1945459296360552',  name: 'Bocaiuva' },
  { id: '815737430504184',   name: 'Campinas' },
  { id: '898087053113777',   name: 'Pirapora' },
  { id: '718790137924927',   name: 'Conquista' },
  { id: '505755245757325',   name: 'Porto Seguro' },
  { id: '1185830483132999',  name: 'Januária' },
  { id: '1675046163715555',  name: 'Salinas' },
  { id: '1512851600567325',  name: 'Contagem' },
  { id: '547206184401772',   name: 'Anápolis' },
  { id: '1572310324316523',  name: 'Goiânia Alto da Glória' },
  { id: '930248282851717',   name: 'Lauro de Freitas' },
  { id: '1228370282243542',  name: 'Salvador Rua' },
  { id: '364524186711060',   name: 'Balneário' },
  { id: '477466964832908',   name: 'Águas Claras' },
  { id: '668267178630065',   name: 'Cuiabá' },
  { id: '3059066484235266',  name: 'Patos de Minas' },
  { id: '875643981579212',   name: 'Indaiatuba' },
  { id: '1143194000455806',  name: 'Foz do Iguaçu' },
  { id: '2350525475462622',  name: 'Foz do Iguaçu 02' },
];

const GRAPH = 'https://graph.facebook.com/v20.0';
let token = '';
let activeTab = 0;
const cache = {};

// ─── TABS ─────────────────────────────────────────────────────
function buildTabs() {
  document.getElementById('tabsWrap').innerHTML =
    ACCOUNTS.map((a, i) =>
      `<div class="tab${i===0?' active':''}" id="tab${i}" onclick="switchTab(${i})">${a.name}</div>`
    ).join('');
}

function switchTab(i) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab${i}`).classList.add('active');
  activeTab = i;
  if (token) loadData(i);
}

function connect() {
  token = document.getElementById('tokenInput').value.trim();
  if (!token) return alert('Cole o Access Token antes de conectar.');
  Object.keys(cache).forEach(k => delete cache[k]);
  document.getElementById('exportWrap').style.display = 'block';
  loadData(activeTab);
}

function reloadTab() {
  Object.keys(cache).forEach(k => delete cache[k]);
  if (token) loadData(activeTab);
}

// ─── API ──────────────────────────────────────────────────────
async function gql(path, params = {}) {
  const url = new URL(`${GRAPH}/${path}`);
  url.searchParams.set('access_token', token);
  for (const [k,v] of Object.entries(params)) url.searchParams.set(k, v);
  const r = await fetch(url);
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d;
}

async function loadData(idx) {
  const acc = ACCOUNTS[idx];
  const preset = document.getElementById('datePreset').value;
  const key = `${acc.id}_${preset}`;
  setLoading(acc.name);
  try {
    if (!cache[key]) cache[key] = await fetchAll(acc, preset);
    render(acc, cache[key]);
  } catch(e) {
    setError(e.message);
  }
}

async function fetchAll(acc, preset) {
  const act = `act_${acc.id}`;
  const [totals, camps, adsIns] = await Promise.all([
    gql(`${act}/insights`, {
      fields: 'spend,reach,impressions',
      date_preset: preset
    }),
    gql(`${act}/campaigns`, {
      effective_status: '["ACTIVE","PAUSED","ARCHIVED","DELETED","IN_PROCESS","WITH_ISSUES"]',
      fields: `name,objective,insights.date_preset(${preset}){spend,reach,impressions}`,
      limit: 30
    }),
    gql(`${act}/insights`, {
      level: 'ad',
      fields: 'ad_id,ad_name,spend,reach,impressions,clicks',
      date_preset: preset,
      sort: 'reach_descending',
      limit: 5
    })
  ]);

  // Filtra campanhas que veicularam (impressões > 1)
  const campaigns = (camps.data || []).filter(c => {
    const imp = Number(c.insights?.data?.[0]?.impressions || 0);
    return imp > 1;
  });

  // Top 3 ads com thumbnail
  const rawAds = (adsIns.data || []).filter(a => Number(a.impressions||0) > 1).slice(0,3);
  const topAds = await Promise.all(rawAds.map(async ad => {
    try {
      const d = await gql(ad.ad_id, { fields: 'creative{thumbnail_url,image_url}' });
      return { ...ad, thumb: d.creative?.thumbnail_url || d.creative?.image_url || null };
    } catch { return { ...ad, thumb: null }; }
  }));

  return { summary: totals.data?.[0] || {}, campaigns, topAds };
}

// ─── FORMATO ──────────────────────────────────────────────────
const N  = n => n ? Number(n).toLocaleString('pt-BR') : '0';
const BRL = n => n ? Number(n).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}) : 'R$ 0,00';

function dateLabel() {
  const p = document.getElementById('datePreset').value;
  const d = new Date();
  const day = d.getDate(), year = d.getFullYear();
  const month = d.toLocaleString('pt-BR',{month:'long'});
  return {
    this_month: `01 a ${day} de ${month} de ${year}`,
    last_month: 'Mês anterior',
    last_7d: 'Últimos 7 dias',
    last_30d: 'Últimos 30 dias',
    this_year: `Janeiro a ${month} de ${year}`,
  }[p] || p;
}

function periodShort() {
  const p = document.getElementById('datePreset').value;
  const d = new Date();
  return {
    this_month: `01–${d.getDate()}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`,
    last_month: 'Mês anterior',
    last_7d: 'Últimos 7 dias',
    last_30d: 'Últimos 30 dias',
    this_year: String(d.getFullYear()),
  }[p] || p;
}

// Detecta ícone pelo nome/objetivo da campanha
function campIcon(name='', obj='') {
  const t = (name+obj).toUpperCase();
  if (t.includes('VIDEO') || t.includes('VÍDEO') || t.includes('REEL')) return {cls:'video', ico:'▶'};
  if (t.includes('SEGUIDOR') || t.includes('FOLLOW') || t.includes('PERFIL')) return {cls:'follow', ico:'👤'};
  if (t.includes('TRAFEGO') || t.includes('TRÁFEGO') || t.includes('IFOOD') || t.includes('DELIVERY') || t.includes('LINK')) return {cls:'conv', ico:'🔗'};
  return {cls:'reach', ico:'📣'};
}

// ─── RENDER ───────────────────────────────────────────────────
function setLoading(name) {
  document.getElementById('dashPage').innerHTML =
    `<div class="state-box"><div class="spinner"></div><p>Carregando <strong>${name}</strong>…</p></div>`;
}
function setError(msg) {
  document.getElementById('dashPage').innerHTML =
    `<div class="state-box"><div class="ico">⚠️</div>
     <div class="err-box">${msg}</div>
     <p style="font-size:12px">Verifique o token e a permissão <code>ads_read</code>.</p></div>`;
}

const MCLASS = ['m1','m2','m3'];

function render(acc, {summary, campaigns, topAds}) {

  // ── best ad para insights
  const best = topAds[0] || null;

  // ── campanhas HTML
  const campsHtml = campaigns.length === 0
    ? '<p class="no-data">Nenhuma campanha veiculou no período.</p>'
    : campaigns.map(c => {
        const ins = c.insights?.data?.[0] || {};
        const {cls, ico} = campIcon(c.name, c.objective||'');
        return `
        <div class="camp-item">
          <div class="camp-icon ${cls}">${ico}</div>
          <div style="flex:1">
            <div class="camp-name">${c.name}</div>
            <div class="camp-metrics">
              <strong>${BRL(ins.spend)}</strong>
              <span class="sep">•</span>
              Alcance: <strong>${N(ins.reach)}</strong>
              <span class="sep">•</span>
              Impressões: <strong>${N(ins.impressions)}</strong>
            </div>
          </div>
        </div>`;
      }).join('');

  // ── top ads HTML
  const adsHtml = topAds.length === 0
    ? '<p class="no-data">Sem dados de anúncios no período.</p>'
    : topAds.map((ad,i) => `
      <div class="ad-item">
        <div class="ad-medal ${MCLASS[i]}">${i+1}</div>
        ${ad.thumb
          ? `<img class="ad-thumb" src="${ad.thumb}" crossorigin="anonymous" alt=""
               onerror="this.outerHTML='<div class=ad-thumb-ph>🖼️</div>'">`
          : `<div class="ad-thumb-ph">🖼️</div>`}
        <div class="ad-info">
          <div class="ad-name" title="${ad.ad_name}">${ad.ad_name}</div>
          <div class="ad-metrics">
            <div><div class="am-label">Investimento</div><div class="am-value">${BRL(ad.spend)}</div></div>
            <div><div class="am-label">Alcance</div><div class="am-value">${N(ad.reach)}</div></div>
            <div><div class="am-label">Impressões</div><div class="am-value">${N(ad.impressions)}</div></div>
            <div><div class="am-label">Cliques</div><div class="am-value">${N(ad.clicks)}</div></div>
          </div>
        </div>
      </div>`).join('');

  // ── insights rápidos
  const topByClicks    = [...topAds].sort((a,b)=>Number(b.clicks||0)-Number(a.clicks||0))[0];
  const topByReach     = [...topAds].sort((a,b)=>Number(b.reach||0)-Number(a.reach||0))[0];
  const topByImpr      = [...topAds].sort((a,b)=>Number(b.impressions||0)-Number(a.impressions||0))[0];

  const insightCards = [
    { ico:'🏆', label:'Melhor anúncio',          name: best?.ad_name||'—',         value: BRL(best?.spend) },
    { ico:'👆', label:'Maior volume de cliques',  name: topByClicks?.ad_name||'—',  value: `${N(topByClicks?.clicks)} cliques` },

    { ico:'👁️', label:'Mais impressões',          name: topByImpr?.ad_name||'—',    value: `${N(topByImpr?.impressions)} imp.` },

    <div class="insight-card">
      <div class="ins-icon">${c.ico}</div>

      <div class="ins-name" title="${c.name}">${c.name}</div>

  document.getElementById('dashPage').innerHTML = `

           onerror="this.style.display='none'">
    </div>

    <!-- KPI -->
    <div class="kpi-grid">

      <div class="kpi-card">
        <div class="kpi-icon reach">👥</div>
        <div class="kpi-label">Alcance</div>
        <div class="kpi-value">${N(summary.reach)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon eye">👁️</div>
        <div class="kpi-label">Impressões</div>
        <div class="kpi-value">${N(summary.impressions)}</div>
      </div>
    </div>

    <!-- CAMPANHAS -->
    <div class="section">
      <div class="section-title"><span class="icon">📣</span> Campanhas ativas</div>
      ${campsHtml}
    </div>

    <!-- RESUMO META ADS -->
    <div class="section">
      <div class="section-title"><span class="icon">∞</span> Resumo da conta Meta Ads</div>
      <div class="resumo-row">
        <div class="meta-logo">∞</div>
        <div>
          <div class="resumo-label">Meta Ads</div>
          <div class="resumo-name">Berry's | ${acc.name}</div>
        </div>
      </div>
      <div class="resumo-stats">
        <div><div class="rs-label">Investimento</div><div class="rs-value">${BRL(summary.spend)}</div></div>
        <div><div class="rs-label">Alcance</div><div class="rs-value">${N(summary.reach)}</div></div>
        <div><div class="rs-label">Impressões</div><div class="rs-value">${N(summary.impressions)}</div></div>
        <div><div class="rs-label">Período</div><div class="rs-value" style="font-size:10px">${periodShort()}</div></div>
      </div>

    <!-- MELHORES ANÚNCIOS -->
    <div class="section">

    <!-- INSIGHTS RÁPIDOS -->
    ${topAds.length > 0 ? `

// ─── EXPORT ───────────────────────────────────────────────────
async function exportImage() {
  const el = document.getElementById('exportTarget');
  if (!el) return;
  const btn = document.getElementById('btnExport');
  btn.disabled = true; btn.textContent = '⏳ Gerando imagem…';
  try {
    const canvas = await html2canvas(el, {
      scale: 2.5, useCORS: true,
      backgroundColor: '#e8eef8', logging: false,
    });
    const link = document.createElement('a');
    link.download = `berrys_${ACCOUNTS[activeTab].name.replace(/\s+/g,'_')}_meta_ads.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) { alert('Erro: ' + e.message); }
  btn.disabled = false; btn.textContent = '📸 Exportar como imagem';
}

// ─── START ────────────────────────────────────────────────────
buildTabs();
